{% extends "account/base.html" %}
{% load i18n %}
{% load crispy_forms_tags %} {% block account_content %}
<h3 class="text-center mb-4">নতুন অ্যাকাউন্ট তৈরি করুন</h3>
<form class="signup" id="signup_form" method="post" action="{% url 'account_signup' %}">
    {% csrf_token %}
    {{ form|crispy }} {% if redirect_field_value %}
    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
    {% endif %}
    
    <div class="d-grid gap-2 mt-4">
        <button class="btn btn-primary btn-lg" type="submit">রেজিস্ট্রেশন করুন</button>
    </div>
</form>

<div class="mt-3 text-center">
    <p>ইতিমধ্যেই অ্যাকাউন্ট আছে? <a href="{{ login_url }}">লগইন করুন</a></p>
</div>
{% endblock %}
