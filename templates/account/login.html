{% extends "account/base.html" %}
{% load i18n %}
{% load account socialaccount %}
{% load crispy_forms_tags %}

{% block account_content %}
<h3 class="text-center mb-4">লগইন করুন</h3>

<form class="login" method="POST" action="{% url 'account_login' %}">
  {% csrf_token %}
  {{ form|crispy }}
  
  {% if redirect_field_value %}
  <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
  {% endif %}

  <div class="d-flex justify-content-between align-items-center mb-3">
      <a class="small" href="{% url 'account_reset_password' %}">পাসওয়ার্ড ভুলে গেছেন?</a>
  </div>

  <div class="d-grid gap-2">
      <button class="btn btn-success btn-lg" type="submit">লগইন</button>
  </div>
</form>

<div class="mt-3 text-center">
    <p>অ্যাকাউন্ট নেই? <a href="{{ signup_url }}">সাইন-আপ করুন</a></p>
</div>
{% endblock %}
