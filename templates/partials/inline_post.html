<div id="inline-post-{{ post.slug }}" class="loaded-full-post mt-3">
    <div class="pp" style="animation: fadeIn 0.5s;">
        {{ post.post_details|safe }}
    </div>
    
    <div class="mt-3">
        <a href="{% url 'single_post' post.slug %}" class="btn btn-dark btn-sm px-4 py-2" style="border-radius:50px;">
            Go to Full Page & Comments <i class="fa fa-arrow-right"></i>
        </a>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
