<div id="inline-post-{{ post.slug }}" class="loaded-full-post mt-3" style="border-left: 3px solid #28a745; padding-left: 15px; margin-bottom: 20px;">
    <div class="blog-content"> <div class="pp" style="animation: fadeIn 0.5s; color: inherit; line-height: 1.8;">
            {{ post.post_details|safe }}
        </div>
    </div>
    
    <div class="mt-4">
        <a href="{% url 'single_post' post.slug %}" class="btn btn-primary btn-sm px-4 py-2" style="border-radius:50px; font-weight: bold; color: white;">
            Go to Full Page & Comments <i class="fa fa-arrow-right"></i>
        </a>
    </div>
</div>

<style>
    /* ডার্ক মোডে ইনলাইন পোস্টের ব্যাকগ্রাউন্ড ফিক্স */
    body.dark-mode .loaded-full-post {
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 8px;
    }
    
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
</style>
