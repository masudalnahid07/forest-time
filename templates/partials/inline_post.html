<div id="inline-post-{{ post.slug }}" class="loaded-full-post mt-3 border-start border-3 border-success ps-4 mb-4 animate-fadeIn">
    <div class="blog-content">
        <div class="pp text-dark fs-5 mb-4" style="line-height: 1.8;">
            {{ post.post_details|safe }}
        </div>
    </div>
    
    <div class="mt-2">
        <a href="{% url 'single_post' post.slug %}" class="btn btn-primary btn-sm px-4 py-2 rounded-pill fw-bold shadow-sm">
            Go to Full Page & Comments <i class="fa fa-arrow-right ms-1"></i>
        </a>
    </div>
</div>

{% block extra_css %}
<style>
    /* ডার্ক মোড এবং অ্যানিমেশন সাপোর্ট */
    body.dark-mode .loaded-full-post {
        background-color: rgba(255, 255, 255, 0.05);
        padding: 25px !important; /* ডার্ক মোডে কন্টেন্ট যেন গায়ের সাথে লেগে না থাকে */
        border-radius: 12px;
    }

    body.dark-mode .pp {
        color: #f8f9fa !important;
    }

    .animate-fadeIn {
        animation: fadeInSlideUp 0.6s ease-out forwards;
    }

    @keyframes fadeInSlideUp { 
        from { opacity: 0; transform: translateY(15px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
</style>
{% endblock extra_css %}
