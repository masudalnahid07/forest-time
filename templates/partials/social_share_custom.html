{% load social_share %}

<div class="share-section-v2 my-4 py-3 border-top border-bottom border-light-subtle">
    <div class="d-flex align-items-center flex-wrap gap-3">
        
        <span class="text-uppercase fw-bold text-muted small me-1">Share This:</span>

        <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}" 
           target="_blank" title="Share on Facebook"
           class="share-icon btn-facebook shadow-sm">
            <i class="fa fa-facebook"></i>
        </a>

        <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}&text={{ post.title }}" 
           target="_blank" title="Share on Twitter"
           class="share-icon btn-twitter shadow-sm">
            <i class="fa fa-twitter"></i>
        </a>

        <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ request.build_absolute_uri }}" 
           target="_blank" title="Share on LinkedIn"
           class="share-icon btn-linkedin shadow-sm">
            <i class="fa fa-linkedin"></i>
        </a>

        <a href="https://www.reddit.com/submit?url={{ request.build_absolute_uri }}&title={{ post.title }}" 
           target="_blank" title="Share on Reddit"
           class="share-icon btn-reddit shadow-sm">
            <i class="fa fa-reddit"></i>
        </a>

        <a href="https://api.whatsapp.com/send?text={{ post.title }} {{ request.build_absolute_uri }}" 
           target="_blank" title="Share on WhatsApp"
           class="share-icon btn-whatsapp shadow-sm">
            <i class="fa fa-whatsapp"></i>
        </a>

        <button onclick="copyPostLink('{{ request.build_absolute_uri }}')" 
                title="Copy Link"
                class="share-icon btn-copy shadow-sm border-0">
            <i class="fa fa-link"></i>
        </button>

    </div>
</div>

{% block extra_css %}
<style>
    /* সোশ্যাল বাটন কমন ডিজাইন */
    .share-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white !important;
        text-decoration: none;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .share-icon:hover {
        transform: translateY(-3px);
        opacity: 0.9;
        color: white !important;
    }

    /* সোশ্যাল ব্র্যান্ড কালার */
    .btn-facebook { background-color: #3b5998; }
    .btn-twitter  { background-color: #1DA1F2; }
    .btn-linkedin { background-color: #0077b5; }
    .btn-reddit   { background-color: #FF4500; }
    .btn-whatsapp { background-color: #25d366; }
    .btn-copy     { background-color: #e74c3c; }

    /* ডার্ক মোড সাপোর্ট */
    body.dark-mode .share-section-v2 {
        border-color: #333 !important;
    }
    body.dark-mode .text-muted {
        color: #aaa !important;
    }
</style>
{% endblock extra_css %}

<script>
function copyPostLink(url) {
    navigator.clipboard.writeText(url).then(() => {
        Swal.fire({
            icon: 'success',
            title: 'Link Copied!',
            text: 'The article link has been copied to your clipboard.',
            timer: 2000,
            showConfirmButton: false,
            toast: true,
            position: 'top-end'
        });
    });
}
</script>
