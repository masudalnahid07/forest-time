<div id="{{ field_name }}-row" class="list-group-item d-flex justify-content-between align-items-center py-3">
    <div>
        <strong>{{ field_name|title }}:</strong> 
        <span class="ml-2 text-dark">
            {% if field_name == 'profile_image' %}
                <img src="{{ value }}" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
            {% else %}
                {{ value }}
            {% endif %}
        </span>
        
        {% if field_name == 'email' %}
            <span class="badge badge-warning ml-2" style="font-size: 10px; animation: fadeIn 0.5s;">
                <i class="fa fa-hourglass-half"></i> Request Sent (Pending Approval)
            </span>
            
            <button hx-post="{% url 'cancel_email_request' %}" 
                    hx-target="#email-row" 
                    hx-swap="outerHTML"
                    hx-confirm="Are you sure you want to cancel this request?"
                    class="btn btn-sm btn-link text-danger ml-1" 
                    style="font-size: 11px; text-decoration: none;">
                Cancel
            </button>
        {% else %}
            <span class="badge badge-success ml-2" style="font-size: 11px; animation: fadeOut 3s forwards;">
                ✅ {{ success_msg }}
            </span>
        {% endif %}
    </div>

    <button hx-get="{% url 'edit_field' field_name %}" hx-target="#{{ field_name }}-row" hx-swap="outerHTML" class="btn btn-sm btn-light text-primary">
        <i class="fa fa-pencil"></i> Edit
    </button>
</div>

<style>
@keyframes fadeOut { 0% {opacity: 1;} 70% {opacity: 1;} 100% {opacity: 0; visibility: hidden;} }
@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
</style>
