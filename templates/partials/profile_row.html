{% load custom_filters %}

<div id="{{ field_name }}-row" class="list-group-item d-flex justify-content-between align-items-center py-3" style="transition: all 0.4s ease; border-radius: 10px; border: 1px solid #f0f0f0; margin-bottom: 5px;">
    <div>
        <strong class="text-dark">{{ field_name|title|replace_underscore }}:</strong> 
        <span class="text-muted ml-2">
            {% if field_name == 'profile_image' %}
                <img src="{{ user.profile.image.url }}" 
                     style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; vertical-align: middle;">
            {% else %}
                {{ value|default:"Not set" }}
            {% endif %}
        </span>
        
        {% if success_msg %}
            <span id="msg-{{ field_name }}" class="ml-3 text-success small animate__animated animate__fadeIn">
                <i class="fa fa-check"></i> {{ success_msg }}
            </span>
            <script>
                setTimeout(() => { document.getElementById('msg-{{ field_name }}').style.display = 'none'; }, 3000);
            </script>
        {% endif %}
    </div>

    <button hx-get="{% url 'edit_field' field_name %}" 
            hx-target="#{{ field_name }}-row" 
            hx-swap="outerHTML" 
            class="btn btn-sm btn-light text-primary d-flex align-items-center"
            style="border-radius: 20px; border: 1px solid #eee; padding: 5px 15px; font-weight: 500;">
        <i class="fa fa-pencil mr-1"></i> Edit
    </button>

    {% if field_name == 'profile_image' %}
        <div hx-get="{% url 'profile' %}" hx-target="#profile-card-container" hx-select="#profile-card-container" hx-trigger="load"></div>
    {% endif %}
</div>
