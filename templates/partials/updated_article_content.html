<div class="pp text-dark fs-5" style="line-height: 1.9;">
    {{ post.post_details|safe }}
</div>

{% if request.user.is_authenticated %}
    {% if request.user.id == post.author.user.id or request.user.is_superuser %}
    <div class="text-end mt-4 pt-3 border-top border-dashed">
        <button class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm" 
                hx-get="{% url 'htmx_edit_article' post.slug %}" 
                hx-target="#article-content-wrapper" 
                hx-swap="innerHTML">
            <i class="fa fa-edit me-1"></i> Click To Edit
        </button>
    </div>
    {% endif %}
{% endif %}

{% block extra_css %}
<style>
    /* ড্যাশবোর্ড বর্ডারের জন্য কাস্টম ড্যাশড স্টাইল */
    .border-dashed {
        border-top: 1px dashed #ccc !important;
    }
    
    /* HTMX রিকোয়েস্ট চলাকালীন বাটনের অবস্থা */
    .htmx-request {
        opacity: 0.7;
        cursor: wait;
    }
</style>
{% endblock extra_css %}
