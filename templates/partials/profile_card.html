{% load static %}

<div id="profile-card-container" class="custombox authorbox p-4 p-md-5 rounded-4 border shadow-sm" style="background-color: var(--bs-body-bg);">
    <div class="row align-items-center g-4">
        <div class="col-md-3 text-center">
            <img src="{% if user.author_profile.author_image %}{{ user.author_profile.author_image.url }}{% else %}https://ui-avatars.com/api/?name={{ user.username }}&background=28a745&color=fff&size=128{% endif %}" 
                 class="img-fluid rounded-circle border border-4 border-white shadow-sm" 
                 alt="{{ user.username }}"
                 style="width: 140px; height: 140px; object-fit: cover;">
        </div>
        
        <div class="col-md-9 text-center text-md-start">
            <h2 class="fw-bolder mb-1 text-dark">
                {{ user.author_profile.full_name|default:user.username }}
            </h2>
            <p class="text-success fw-bold mb-2">@{{ user.username }}</p>
            
            <p class="text-secondary small mb-3 lh-base">
                {{ user.author_profile.bio|default:"No bio added yet." }}
            </p>
            
            <hr class="my-3 opacity-25">
            
            <div class="user-stats d-flex justify-content-center justify-content-md-start align-items-center flex-wrap gap-2">
                <span class="badge bg-success rounded-pill px-3 py-2 fw-medium shadow-sm">
                    <i class="fa fa-comments me-1"></i> Comments: {{ comments_count }}
                </span>
                <span class="badge bg-info text-white rounded-pill px-3 py-2 fw-medium shadow-sm">
                    <i class="fa fa-calendar me-1"></i> Joined: {{ user.date_joined|date:"M Y" }}
                </span>
            </div>
        </div>
    </div>
</div>

{% block extra_css %}
<style>
    /* ডার্ক মোড সাপোর্ট এবং কার্ড ফিনিশিং */
    body.dark-mode #profile-card-container {
        background-color: #1a1a1a !important;
        border-color: #333 !important;
    }
    body.dark-mode .text-dark {
        color: #f8f9fa !important;
    }
    body.dark-mode .border-white {
        border-color: #2c2c2c !important; /* ডার্ক মোডে ইমেজের বর্ডার এডজাস্টমেন্ট */
    }
    body.dark-mode .bg-info {
        background-color: #0dcaf0 !important;
    }
</style>
{% endblock extra_css %}
