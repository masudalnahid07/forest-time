{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="page-title wb">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-md-8 col-sm-12 col-xs-12">
                <h2><i class="fa fa-edit bg-green"></i> Edit Article</h2>
            </div>
            <div class="col-lg-4 col-md-4 col-sm-12 hidden-xs-down hidden-sm-down">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                    <li class="breadcrumb-item active">Edit Article</li>
                </ol>
            </div>
        </div>
    </div>
</div>

<section class="section wb">
    <div class="container">
        <div class="row">
            <div class="col-lg-9 col-md-12 col-sm-12 col-xs-12">
                <div class="page-wrapper">
                    <div class="blog-content shadow-sm" style="padding: 30px; border: 1px solid #eee; color: inherit; border-radius: 12px;">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.media }}
                            
                            <div class="form-group custom-form">
                                {{ form.as_p }}
                            </div>
                            
                            <hr style="margin: 25px 0;">

                            <div class="btn-group-action d-flex align-items-center">
                                <button type="submit" class="btn btn-success px-4 py-2" 
                                        style="border-radius: 50px; font-weight: bold; margin-right: 15px; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);">
                                    <i class="fa fa-save"></i> Update Article
                                </button>
                                
                                <a href="{% url 'single_post' post.slug %}" class="btn btn-secondary px-4 py-2" 
                                   style="border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(108, 117, 125, 0.2);">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-12 col-sm-12 col-xs-12">
                {% include "partials/sidebar.html" %}
            </div>
        </div>
    </div>
</section>

<style>
    /* ডার্ক মোডে ফর্মের টেক্সট কালার ফিক্স */
    .custom-form p {
        color: inherit !important;
        margin-bottom: 20px;
    }
    
    .custom-form input, .custom-form select, .custom-form textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fcfcfc;
        color: #333;
        transition: all 0.3s ease;
    }

    .custom-form input:focus {
        border-color: #28a745;
        box-shadow: 0 0 8px rgba(40, 167, 69, 0.1);
        outline: none;
    }

    /* CKEditor রেসপন্সিভনেস */
    .django_ckeditor_5 {
        width: 100% !important;
    }
    .ck-editor__editable {
        min-height: 400px;
        color: #333 !important;
        background: #fff !important;
    }

    body.dark-mode .blog-content {
        background: #1a1a1a !important;
        border-color: #333 !important;
    }

    body.dark-mode .custom-form input, 
    body.dark-mode .custom-form select, 
    body.dark-mode .custom-form textarea {
        background: #252525;
        border-color: #444;
        color: #eee;
    }

    /* বাটনের হোভার এফেক্ট */
    .btn-group-action .btn:hover {
        transform: translateY(-2px);
        transition: 0.3s;
    }
</style>
{% endblock content %}
