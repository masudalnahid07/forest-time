{% load static %}
<footer class="footer">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="widget">
                    <div class="footer-text text-center">
                        <a href="{% url 'home' %}">
                            <img src="{% static 'images/version/garden-footer-logo.png' %}" alt="Forest Time Footer Logo" class="img-fluid" loading="lazy">
                        </a>
                        
                        <p style="color: inherit; opacity: 0.8;">Forest Time is a personal blog for handcrafted photography content, gardening tips, and lifestyle stories from independent creatives around the world.</p>
                        
                        <div class="social">
                            <a href="#" data-toggle="tooltip" data-placement="bottom" title="Facebook"><i class="fa fa-facebook"></i></a>               
                            <a href="#" data-toggle="tooltip" data-placement="bottom" title="Twitter"><i class="fa fa-twitter"></i></a>
                            <a href="#" data-toggle="tooltip" data-placement="bottom" title="Instagram"><i class="fa fa-instagram"></i></a>
                            <a href="#" data-toggle="tooltip" data-placement="bottom" title="Pinterest"><i class="fa fa-pinterest"></i></a>
                        </div>

                        <hr class="invis">

                        <div class="newsletter-widget text-center">
                            <form class="form-inline justify-content-center">
                                <input type="email" class="form-control" placeholder="Enter your email address" required style="border-radius: 50px 0 0 50px; padding-left: 20px;">
                                <button type="submit" class="btn btn-primary" style="border-radius: 0 50px 50px 0; padding: 0 25px;">Subscribe <i class="fa fa-envelope-open-o"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 text-center">
                <br>
                <div class="copyright" style="color: inherit; opacity: 0.6;">
                    &copy; {% now "Y" %} **Forest Time**. All rights reserved. 
                    <br>
                    Developed by <a href="https://github.com/masudalnahid07" target="_blank" style="color: #28a745; font-weight: bold;">Nahid</a>
                </div>
            </div>
        </div>
    </div>
</footer>


<button id="smart-scroll-top" title="Scroll to top">
<i class="fa fa-arrow-up"></i>
</button>
